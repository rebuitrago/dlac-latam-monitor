name: Weekly LATAM Data Refresh

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance requests pandas

      - name: Fetch LATAM market data
        run: python fetch_data.py

      - name: Copy data to docs/
        run: |
          mkdir -p docs/data
          cp data/latam_data.json docs/data/latam_data.json

      - name: Commit and push updated data
        run: |
          git config --global user.name  "DLAC Monitor Bot"
          git config --global user.email "dlac-bot@egade.tec.mx"
          git add data/latam_data.json docs/data/latam_data.json
          git diff --staged --quiet || git commit -m \
            "🔄 Auto-update: LATAM market data $(date +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
